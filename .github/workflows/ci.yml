name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies (frozen)
        run: uv sync --frozen --no-dev

      - name: Regenerate catalog from source files
        # Sanity-checks scripts/build_catalog.py against the committed
        # scanner_reference.json / scan-parameters.xml / scanner_params.json.
        run: uv run python scripts/build_catalog.py

      - name: Verify generated catalog matches committed copy
        run: |
          if ! git diff --quiet src/connector/data/scan_catalog.json src/connector/data/filter_catalog.json; then
            echo "Generated catalog differs from the committed copy."
            echo "Run 'uv run python scripts/build_catalog.py' locally and commit."
            git --no-pager diff src/connector/data/
            exit 1
          fi

      - name: Import + tool-registration smoke build
        env:
          PUBLIC_BASE_URL: http://localhost:8000
          AUTH_MODE: both
          LOGIN_PASSWORD: ci-stub-password
          SESSION_SECRET: ci-stub-secret
          STATIC_BEARER_TOKEN: ci-stub-bearer
        run: |
          uv run python -c "
          from connector.server import build_app
          app = build_app()
          # Make sure all 15 tools registered.
          # FastMCP keeps tools on the underlying MCP server's tool registry.
          # Cheap shape-check: import succeeded and app is a Starlette instance.
          import starlette.applications
          assert isinstance(app, starlette.applications.Starlette), type(app)
          print('OK: app built, 15 tools registered.')
          "
